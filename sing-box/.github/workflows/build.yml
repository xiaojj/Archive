          export PATH="$PATH:$(go env GOPATH)/bin"
          go run ./cmd/internal/build_libbox -target android -platform android/${{ matrix.go_arch }}
          mkdir -p dist/${{ matrix.go_arch }}
          mv libbox.aar libbox-legacy.aar dist/${{ matrix.go_arch }}
