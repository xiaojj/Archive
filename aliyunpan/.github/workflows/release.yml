name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  linux-mpv-test:
    name: Verify Linux MPV
    uses: ./.github/workflows/mpv-linux.yml

  create-release:
    name: Create Release Draft
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create shared release draft
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft --title "BoxPlayer ${GITHUB_REF_NAME}"

  release:
    name: Build Release
    needs: [linux-mpv-test, create-release]
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-14 ]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - uses: pnpm/action-setup@v3
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10.32.1
          run_install: false

      - name: Get Pnpm Store Directory
        shell: bash
        run: |
          echo "PNPM_STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Get Electron Store Directory
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "ELECTRON_STORE_PATH=$LOCALAPPDATA\\electron\\cache" >> $GITHUB_ENV
            echo "ELECTRON_BUILDER_STORE_PATH=$LOCALAPPDATA\\electron-builder\\cache" >> $GITHUB_ENV
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "ELECTRON_STORE_PATH=$HOME/Library/Caches/electron" >> $GITHUB_ENV
          else
            echo "ELECTRON_STORE_PATH=$HOME/.cache/electron" >> $GITHUB_ENV
            echo "ELECTRON_BUILDER_STORE_PATH=$HOME/.cache/electron-builder" >> $GITHUB_ENV
          fi

      - name: Setup Pnpm Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_STORE_PATH }}
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Setup Cache Electron Builder
        uses: actions/cache@v4
        if: matrix.os != 'macos-14'
        with:
          path: ${{ env.ELECTRON_BUILDER_STORE_PATH }}
          key: ${{ runner.os }}-electron-builder-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-cache-

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Generate Release Secrets
        env:
          REQUIRED_RELEASE_SECRETS: ALIYUN_APP_ID,ALIYUN_APP_SECRET,BAIDU_APP_ID,BAIDU_APP_SECRET,CLOUD123_APP_ID,CLOUD123_APP_SECRET,DRIVE115_APP_ID,DRIVE115_APP_SECRET,DROPBOX_APP_KEY,ONEDRIVE_CLIENT_ID,BOX_CLIENT_ID,PIKPAK_CLIENT_ID,PIKPAK_CLIENT_SECRET,GUANGYA_CLIENT_ID,CLOUD189_APP_ID,BOXPLAYER_AI_API_URL,BOXPLAYER_API_URL,BOXPLAYER_SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,BOXPLAYER_SITE_URL
          ALIYUN_APP_ID: ${{ secrets.ALIYUN_APP_ID }}
          ALIYUN_APP_SECRET: ${{ secrets.ALIYUN_APP_SECRET }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_APP_SECRET: ${{ secrets.BAIDU_APP_SECRET }}
          BAIDU_PCS_APP_ID: ${{ secrets.BAIDU_PCS_APP_ID }}
          CLOUD123_APP_ID: ${{ secrets.CLOUD123_APP_ID }}
          CLOUD123_APP_SECRET: ${{ secrets.CLOUD123_APP_SECRET }}
          DRIVE115_APP_ID: ${{ secrets.DRIVE115_APP_ID }}
          DRIVE115_APP_SECRET: ${{ secrets.DRIVE115_APP_SECRET }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          PIKPAK_CLIENT_ID: ${{ secrets.PIKPAK_CLIENT_ID }}
          PIKPAK_CLIENT_SECRET: ${{ secrets.PIKPAK_CLIENT_SECRET }}
          GUANGYA_CLIENT_ID: ${{ secrets.GUANGYA_CLIENT_ID }}
          CLOUD189_APP_ID: ${{ secrets.CLOUD189_APP_ID }}
          SUBTITLE_SEARCH_API_KEY: ${{ secrets.SUBTITLE_SEARCH_API_KEY }}
          SUBTITLE_DOWNLOAD_API_KEY: ${{ secrets.SUBTITLE_DOWNLOAD_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BOXPLAYER_AI_API_URL: ${{ secrets.BOXPLAYER_AI_API_URL }}
          BOXPLAYER_API_URL: ${{ secrets.BOXPLAYER_API_URL }}
          BOXPLAYER_SUPABASE_URL: ${{ secrets.BOXPLAYER_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          BOXPLAYER_SITE_URL: ${{ secrets.BOXPLAYER_SITE_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node scripts/generate-secrets.mjs --mode=ci --strict

      - name: Install Lib For Pacman Build
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install libarchive-tools

      - name: Make Aria2c Executable
        if: matrix.os != 'windows-latest'
        run: |
          chmod -R 777 ./static/engine/

      - name: Build Electron App
        uses: paneron/action-electron-builder@v1.8.1
        env:
          ALIYUN_APP_ID: ${{ secrets.ALIYUN_APP_ID }}
          ALIYUN_APP_SECRET: ${{ secrets.ALIYUN_APP_SECRET }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_APP_SECRET: ${{ secrets.BAIDU_APP_SECRET }}
          BAIDU_PCS_APP_ID: ${{ secrets.BAIDU_PCS_APP_ID }}
          CLOUD123_APP_ID: ${{ secrets.CLOUD123_APP_ID }}
          CLOUD123_APP_SECRET: ${{ secrets.CLOUD123_APP_SECRET }}
          DRIVE115_APP_ID: ${{ secrets.DRIVE115_APP_ID }}
          DRIVE115_APP_SECRET: ${{ secrets.DRIVE115_APP_SECRET }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          PIKPAK_CLIENT_ID: ${{ secrets.PIKPAK_CLIENT_ID }}
          PIKPAK_CLIENT_SECRET: ${{ secrets.PIKPAK_CLIENT_SECRET }}
          GUANGYA_CLIENT_ID: ${{ secrets.GUANGYA_CLIENT_ID }}
          CLOUD189_APP_ID: ${{ secrets.CLOUD189_APP_ID }}
          SUBTITLE_SEARCH_API_KEY: ${{ secrets.SUBTITLE_SEARCH_API_KEY }}
          SUBTITLE_DOWNLOAD_API_KEY: ${{ secrets.SUBTITLE_DOWNLOAD_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BOXPLAYER_AI_API_URL: ${{ secrets.BOXPLAYER_AI_API_URL }}
          BOXPLAYER_API_URL: ${{ secrets.BOXPLAYER_API_URL }}
          BOXPLAYER_SUPABASE_URL: ${{ secrets.BOXPLAYER_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          BOXPLAYER_SITE_URL: ${{ secrets.BOXPLAYER_SITE_URL }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SKIP_VERSION_BUMP: true
          NODE_OPTIONS: --max-old-space-size=6144
        with:
          package_manager: pnpm
          release: true           # 自动创建 Release
          github_token: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    name: Finalize Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_doc="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${release_doc}" ]]; then
            cp "${release_doc}" release-notes.md
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" \
              --jq .body > release-notes.md
          fi
          if [[ ! -s release-notes.md ]]; then
            previous_tag="$(git tag --sort=-version:refname | grep -Fxv "${GITHUB_REF_NAME}" | head -n 1 || true)"
            printf '## 更新内容\n\n' > release-notes.md
            if [[ -n "${previous_tag}" ]]; then
              git log --format="- %s (%h)" "${previous_tag}..${GITHUB_SHA}" >> release-notes.md
            else
              git log --format="- %s (%h)" -1 "${GITHUB_SHA}" >> release-notes.md
            fi
          fi
          if [[ ! -s release-notes.md ]]; then
            echo 'Release notes are empty; refusing to publish' >&2
            exit 1
          fi
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "BoxPlayer ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --prerelease \
            --draft=false
