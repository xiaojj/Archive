name: Linux MPV Integration

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/module/node-mpv/**'
      - 'src/utils/playerhelper.ts'
      - 'src/utils/mpvPlayerPolicy.ts'
      - 'src/utils/__tests__/mpvRuntime.integration.test.ts'
      - '.github/workflows/mpv-linux.yml'
  push:
    branches:
      - main

jobs:
  mpv-integration:
    name: Real MPV Playback
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install MPV and FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv ffmpeg
          mpv --version | head -n 8

      - name: Generate deterministic test video
        run: |
          ffmpeg -y -loglevel error \
            -f lavfi -i 'testsrc=size=320x180:rate=10' \
            -f lavfi -i 'sine=frequency=1000:sample_rate=44100' \
            -t 2 \
            -c:v mpeg4 \
            -c:a aac \
            -shortest \
            /tmp/boxplayer-mpv-test.mp4

      - name: Run real MPV integration test
        env:
          MPV_BIN: /usr/bin/mpv
          MPV_TEST_MEDIA: /tmp/boxplayer-mpv-test.mp4
        run: pnpm run test:mpv-integration
