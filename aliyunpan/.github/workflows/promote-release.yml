name: Promote Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要转为正式 Release 的 tag，例如 v5.0.1'
        required: true
        type: string

concurrency:
  group: promote-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote Pre-release To Release
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: write

    steps:
      - name: Promote GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq .id)"
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f prerelease=false \
            -f draft=false \
            -f make_latest=true
